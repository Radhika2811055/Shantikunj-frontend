    <circle cx="730" cy="1080" r="3"/><circle cx="745" cy="1080" r="3"/><circle cx="760" cy="1080" r="3"/><circle cx="775" cy="1080" r="3"/>
    <circle cx="730" cy="1095" r="3"/><circle cx="745" cy="1095" r="3"/><circle cx="760" cy="1095" r="3"/><circle cx="775" cy="1095" r="3"/>
    <circle cx="730" cy="1110" r="3"/><circle cx="745" cy="1110" r="3"/><circle cx="760" cy="1110" r="3"/><circle cx="775" cy="1110" r="3"/>
    <circle cx="730" cy="1125" r="3"/><circle cx="745" cy="1125" r="3"/><circle cx="760" cy="1125" r="3"/><circle cx="775" cy="1125" r="3"/>
    <circle cx="730" cy="1140" r="3"/><circle cx="745" cy="1140" r="3"/><circle cx="760" cy="1140" r="3"/><circle cx="775" cy="1140" r="3"/>
    <circle cx="730" cy="1155" r="3"/><circle cx="745" cy="1155" r="3"/><circle cx="760" cy="1155" r="3"/><circle cx="775" cy="1155" r="3"/>
